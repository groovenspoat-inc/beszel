# gitleaks v8+ config for this fork.
# Extends the default rule set with project-specific patterns.
# Personal/per-machine values are NOT here on purpose - they live in a
# host-local denylist (see .githooks/pre-commit) so they're never committed.

[extend]
useDefault = true

# Catch any leak of a Tailscale CGNAT IP (100.64.0.0/10), not just one IP.
# Format: 100.<64-127>.<0-255>.<0-255>
[[rules]]
id = "tailscale-cgnat-ip"
description = "Tailscale CGNAT IPv4 address (100.64.0.0/10)"
regex = '''\b100\.(6[4-9]|[7-9][0-9]|1[01][0-9]|12[0-7])\.\d{1,3}\.\d{1,3}\b'''
tags = ["network", "internal"]

# Catch the Beszel native-agent shape used by this user:
# BESZEL_TOKEN = <uuid>
[[rules]]
id = "beszel-token-uuid"
description = "Likely BESZEL_TOKEN value (UUID in beszel context)"
regex = '''(?i)BESZEL_TOKEN\s*[:=]\s*['\"]?[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'''
tags = ["secret", "beszel"]

# Generic Windows hostname leak in WIN-XXXXXXX form (auto-generated, often
# unique enough to identify a machine).
[[rules]]
id = "windows-auto-hostname"
description = "Auto-generated Windows hostname WIN-XXXXXXX"
regex = '''\bWIN-[A-Z0-9]{7,11}\b'''
tags = ["identifier"]

# Allow common false-positives that the default rules over-flag.
[allowlist]
description = "Project allowlist"
paths = [
    '''(?i)\.gitleaks\.toml$''',
    '''(?i)go\.sum$''',
    '''(?i)yarn\.lock$''',
    '''(?i)package-lock\.json$''',
]
